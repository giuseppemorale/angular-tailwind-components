<nav [attr.aria-label]="ariaLabel()" class="flex">
  <ol class="inline-flex items-center text-sm">
    @for (item of items(); track item.label; let last = $last; let first = $first) {
      <li class="inline-flex items-center">
        @if (!first) {
          <span class="mx-2 text-neutral-400" aria-hidden="true">
            {{ separator() }}
          </span>
        }
        @if (item.link && !last) {
          <a
            [routerLink]="item.link"
            class="inline-flex items-center gap-1 text-neutral-500 hover:text-primary-600 transition-colors font-medium">
            @if (item.icon) {
              <tailwind-icon [icon]="item.icon" [size]="16" />
            }
            {{ item.label }}
          </a>
        } @else {
          <span
            class="inline-flex items-center gap-1 font-medium"
            [class.text-neutral-900]="last"
            [class.text-neutral-500]="!last"
            [attr.aria-current]="last ? 'page' : null">
            @if (item.icon) {
              <tailwind-icon [icon]="item.icon" [size]="16" />
            }
            {{ item.label }}
          </span>
        }
      </li>
    }
  </ol>
</nav>
