<div
  class="bg-white rounded-xl border border-surface-200 overflow-hidden transition-shadow duration-200"
  [class.shadow-sm]="!elevated()"
  [class.shadow-lg]="elevated()"
  [class.hover:shadow-md]="hoverable() && !elevated()"
  [class.hover:shadow-xl]="hoverable() && elevated()">
  @if (hasHeader()) {
    <!-- Header slot (always rendered; only visible when content is projected) -->
    <div class="px-6 py-4 border-b border-surface-100" [class.bg-surface-50]="headerBg()">
      <ng-content select="tailwind-card-header" />
    </div>
  }

  <!-- Image slot -->
  <ng-content select="tailwind-card-image" />

  <!-- Body -->
  <div [class]="bodyPadding()">
    <ng-content />
  </div>

  @if (hasFooter()) {
    <!-- Footer slot -->
    <div class="px-6 py-4 border-t border-surface-100 bg-surface-50/50">
      <ng-content select="tailwind-card-footer" />
    </div>
  }
</div>
