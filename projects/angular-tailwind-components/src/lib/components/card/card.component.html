<div
  class="bg-white rounded-xl border border-neutral-200 overflow-hidden transition-shadow duration-200"
  [class.shadow-sm]="!elevated()"
  [class.shadow-lg]="elevated()"
  [class.hover:shadow-md]="hoverable() && !elevated()"
  [class.hover:shadow-xl]="hoverable() && elevated()">
  @if (hasHeader()) {
    <!-- Header slot (always rendered; only visible when content is projected) -->
    <div class="px-6 pt-4 pb-2 border-b border-neutral-100" [class.bg-neutral-50]="headerBg()">
      <ng-content select="[tailwind-card-header]" />
    </div>
  }

  <!-- Image slot -->
  <ng-content select="[tailwind-card-image]" />

  <!-- Body -->
  <div class="p-6">
    <ng-content />
  </div>

  @if (hasFooter()) {
    <!-- Footer slot -->
    <div class="px-6 py-4 border-t border-neutral-100 bg-neutral-50/50">
      <ng-content select="[tailwind-card-footer]" />
    </div>
  }
</div>
