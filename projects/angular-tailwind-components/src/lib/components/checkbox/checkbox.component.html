<div
  class="inline-flex items-center gap-2.5 select-none"
  [class.opacity-50]="isDisabled()">
  <label
    class="relative flex items-center justify-center shrink-0"
    [class.cursor-pointer]="!isDisabled()"
    [class.cursor-not-allowed]="isDisabled()"
    [attr.for]="id() ? id() + '-inner' : null">
    <input
      [attr.id]="id() ? id() + '-inner' : null"
      type="checkbox"
      class="peer sr-only"
      [checked]="checked()"
      [disabled]="isDisabled()"
      [attr.aria-describedby]="description() && id() ? id() + '-desc' : null"
      [attr.aria-labelledby]="label() && id() ? id() + '-label' : null"
      (change)="onCheckboxChange($event)" />
    <div
      class="w-full h-full border-2 transition-all duration-150 peer-focus-visible:ring-2 peer-focus-visible:ring-primary-500/30 peer-focus-visible:ring-offset-1"
      [class.rounded-sm]="size() === 'xs' || size() === 'sm'"
      [class.rounded-md]="size() !== 'xs' && size() !== 'sm'"
      [class.border-surface-300]="!checked()"
      [class.bg-white]="!checked()"
      [class.border-primary-600]="checked()"
      [class.bg-primary-600]="checked()">
      @if (checked()) {
        <svg class="w-full h-full text-white p-0.5" viewBox="0 0 16 16" fill="none">
          <path
            d="M13.5 4.5L6.5 11.5L3 8"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      }
    </div>
  </label>

  <div class="flex flex-col gap-0.5 pt-0.5">
    @if (label()) {
      <span [attr.id]="id() ? id() + '-label' : null" class="text-sm font-medium text-surface-800 leading-tight">{{
        label()
      }}</span>
    }
    @if (description()) {
      <span [attr.id]="id() ? id() + '-desc' : null" class="text-xs text-surface-500 leading-snug">
        {{ description() }}
      </span>
    }
  </div>
</div>
