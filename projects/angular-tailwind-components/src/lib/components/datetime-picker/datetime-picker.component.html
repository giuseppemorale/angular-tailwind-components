<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label [attr.for]="id() ? id() + '-inner' : null" class="text-sm font-medium text-surface-700">{{ label() }}</label>
  }
  <div class="relative">
    <input
      [attr.id]="id() ? id() + '-inner' : null"
      type="text"
      readonly
      [value]="displayValue()"
      [placeholder]="effectivePlaceholder()"
      class="block w-full bg-white border border-surface-300 rounded-md px-3 py-2 text-sm text-surface-900 placeholder:text-surface-400 outline-none focus:outline focus:outline-primary-500 focus:outline-offset-2 cursor-pointer disabled:bg-surface-50 disabled:cursor-not-allowed pr-10"
      [disabled]="isDisabled()"
      (click)="togglePanel()" />
    <svg
      class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-surface-400 pointer-events-none"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 20 20"
      fill="currentColor">
      <path
        fill-rule="evenodd"
        d="M5.75 2a.75.75 0 01.75.75V4h7V2.75a.75.75 0 011.5 0V4h.25A2.75 2.75 0 0118 6.75v8.5A2.75 2.75 0 0115.25 18H4.75A2.75 2.75 0 012 15.25v-8.5A2.75 2.75 0 014.75 4H5V2.75A.75.75 0 015.75 2zm-1 5.5c-.69 0-1.25.56-1.25 1.25v6.5c0 .69.56 1.25 1.25 1.25h10.5c.69 0 1.25-.56 1.25-1.25v-6.5c0-.69-.56-1.25-1.25-1.25H4.75z"
        clip-rule="evenodd" />
    </svg>

    @if (showPanel()) {
      <div
        class="absolute left-0 top-full z-popover mt-1 w-80 max-w-full rounded-xl border border-surface-200 bg-white p-4 shadow-xl">
        <div class="flex items-center justify-between mb-3">
          <button
            type="button"
            (click)="prevMonth()"
            class="p-1 rounded-lg hover:bg-surface-100 transition-colors cursor-pointer">
            <svg
              class="w-4 h-4 text-surface-600"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z"
                clip-rule="evenodd" />
            </svg>
          </button>
          <span class="text-sm font-semibold text-surface-800">{{ monthYearLabel() }}</span>
          <button
            type="button"
            (click)="nextMonth()"
            class="p-1 rounded-lg hover:bg-surface-100 transition-colors cursor-pointer">
            <svg
              class="w-4 h-4 text-surface-600"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 20 20"
              fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"
                clip-rule="evenodd" />
            </svg>
          </button>
        </div>
        <div class="grid grid-cols-7 gap-0 mb-1">
          @for (day of weekDays; track day) {
            <div class="text-center text-xs font-medium text-surface-400 py-1">{{ day }}</div>
          }
        </div>
        <div class="grid grid-cols-7 gap-0">
          @for (day of calendarDays(); track $index) {
            @if (day === 0) {
              <div></div>
            } @else {
              <button
                type="button"
                (click)="selectDay(day)"
                class="h-8 w-8 mx-auto rounded-lg text-sm transition-colors cursor-pointer hover:bg-surface-100"
                [class.bg-primary-600]="isSelected(day)"
                [class.text-white]="isSelected(day)"
                [class.hover:bg-primary-700]="isSelected(day)"
                [class.text-surface-700]="!isSelected(day) && !isToday(day)"
                [class.font-semibold]="isToday(day)"
                [class.text-primary-600]="isToday(day) && !isSelected(day)">
                {{ day }}
              </button>
            }
          }
        </div>
        <div class="mt-3 pt-3 border-t border-surface-100 flex items-center gap-2">
          <span class="text-xs font-medium text-surface-600 shrink-0">{{ i18n.time }}</span>
          <select
            class="flex-1 min-w-0 block bg-white border border-surface-300 rounded-md px-2 py-1.5 text-sm text-surface-900 outline-none focus:outline focus:outline-primary-500 focus:outline-offset-2 disabled:bg-surface-50 disabled:cursor-not-allowed"
            [disabled]="isDisabled() || !draft()"
            (change)="onHourChange($event)">
            @for (h of hours; track h) {
              <option [value]="h" [selected]="h === (draft()?.getHours() ?? 0)">
                {{ h.toString().padStart(2, '0') }}
              </option>
            }
          </select>
          <span class="text-surface-400 text-sm">:</span>
          <select
            class="flex-1 min-w-0 block bg-white border border-surface-300 rounded-md px-2 py-1.5 text-sm text-surface-900 outline-none focus:outline focus:outline-primary-500 focus:outline-offset-2 disabled:bg-surface-50 disabled:cursor-not-allowed"
            [disabled]="isDisabled() || !draft()"
            (change)="onMinuteChange($event)">
            @for (m of minutes; track m) {
              <option [value]="m" [selected]="m === (draft()?.getMinutes() ?? 0)">
                {{ m.toString().padStart(2, '0') }}
              </option>
            }
          </select>
        </div>
        <div class="mt-2 pt-2 border-t border-surface-100 flex items-center justify-between gap-2">
          <button
            type="button"
            (click)="goToToday()"
            [disabled]="isDisabled()"
            class="text-xs text-primary-600 font-medium hover:underline cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:no-underline">
            {{ i18n.today }}
          </button>
          <button
            type="button"
            (click)="apply()"
            [disabled]="isDisabled() || !draft()"
            class="px-3 py-1.5 text-xs font-medium rounded-md bg-primary-600 text-white hover:bg-primary-700 cursor-pointer disabled:bg-surface-200 disabled:text-surface-500 disabled:cursor-not-allowed">
            {{ i18n.confirm }}
          </button>
        </div>
      </div>
    }
  </div>
</div>
