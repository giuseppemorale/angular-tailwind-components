<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label class="text-sm font-medium text-surface-700">{{ label() }}</label>
  }
  <div class="flex gap-3 items-start">
    <div class="flex-1">
      <tailwind-date-picker [label]="''" [(value)]="dateValue" (valueChange)="onDateChange()" />
    </div>
    <div class="w-32">
      <tailwind-time-picker [label]="''" [(value)]="timeValue" (valueChange)="onTimeChange()" />
    </div>
  </div>
</div>
