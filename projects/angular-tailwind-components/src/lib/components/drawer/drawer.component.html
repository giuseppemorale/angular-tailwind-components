@if (isOpen()) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 bg-black/40 backdrop-blur-sm z-1040 transition-opacity duration-300"
    [class.opacity-100]="isVisible()"
    [class.opacity-0]="!isVisible()"
    (click)="closeOnBackdrop() && close()"
    aria-hidden="true"></div>

  <!-- Drawer Panel -->
  <div [class]="panelClasses()" role="dialog" [attr.aria-modal]="true" [attr.aria-label]="title()">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-neutral-200">
      @if (title()) {
        <h2 class="text-lg font-semibold text-neutral-900">{{ title() }}</h2>
      }
      <button
        type="button"
        class="p-1.5 -m-1.5 rounded-lg text-neutral-400 hover:text-neutral-600 hover:bg-neutral-100 transition-colors ml-auto cursor-pointer"
        aria-label="Close"
        (click)="close()">
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path
            d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="flex-1 overflow-y-auto px-6 py-5">
      <ng-content />
    </div>

    <!-- Footer -->
    <ng-content select="[tailwind-drawer-footer]" />
  </div>
}
