<div class="tailwind-input-wrapper flex flex-col gap-1.5">
  @if (label()) {
    <label [attr.for]="id() ? id() + '-inner' : null" class="text-sm font-medium text-surface-700" [class.text-danger-600]="hasError()">
      {{ label() }}
      @if (required()) {
        <span class="text-danger-500 ml-0.5">*</span>
      }
    </label>
  }

  <div class="relative">
    @if (prefixIcon()) {
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-surface-400 pointer-events-none">
        <ng-content select="tailwind-prefix" />
      </span>
    }

    <input
      [attr.id]="id() ? id() + '-inner' : null"
      [type]="type()"
      [placeholder]="placeholder()"
      [disabled]="isDisabled()"
      [readonly]="readonly()"
      [attr.aria-invalid]="hasError() || null"
      [attr.aria-describedby]="(helperText() || errorText()) && id() ? id() + '-helper' : null"
      [value]="value()"
      [class]="inputClasses()"
      (input)="onInputChange($event)"
      (blur)="onBlur()" />

    @if (suffixIcon()) {
      <span class="absolute right-3 top-1/2 -translate-y-1/2 text-surface-400 pointer-events-none">
        <ng-content select="tailwind-suffix" />
      </span>
    }
  </div>

  @if (helperText() && !hasError()) {
    <p [attr.id]="id() ? id() + '-helper' : null" class="text-xs text-surface-500">
      {{ helperText() }}
    </p>
  }
  @if (errorText() && hasError()) {
    <p [attr.id]="id() ? id() + '-helper' : null" class="text-xs text-danger-600">
      {{ errorText() }}
    </p>
  }
</div>
