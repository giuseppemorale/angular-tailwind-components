<fieldset
  class="flex gap-3"
  [class.flex-col]="orientation() === 'vertical'"
  [attr.aria-label]="ariaLabel()"
  role="radiogroup">
  @if (label()) {
    <legend class="text-sm font-medium text-neutral-700 mb-2">{{ label() }}</legend>
  }

  @for (option of options(); track option.value) {
    <label
      class="inline-flex items-start gap-2.5 cursor-pointer select-none"
      [class.cursor-not-allowed]="isDisabled() || option.disabled"
      [class.opacity-50]="isDisabled() || option.disabled">
      <div class="relative flex items-center justify-center shrink-0" [class]="radioSizeClass()">
        <input
          type="radio"
          class="peer sr-only"
          [name]="name()"
          [value]="option.value"
          [checked]="value() === option.value"
          [disabled]="isDisabled() || !!option.disabled"
          (change)="onRadioChange(option.value)" />
        <div
          class="w-full h-full rounded-full border-2 transition-all duration-150 peer-focus-visible:ring-2 peer-focus-visible:ring-primary-500/30 peer-focus-visible:ring-offset-1 flex items-center justify-center"
          [class.border-neutral-300]="value() !== option.value"
          [class.border-primary-600]="value() === option.value">
          @if (value() === option.value) {
            <div
              class="rounded-full bg-primary-600 transition-transform duration-150 scale-100"
              [class]="dotSizeClass()"></div>
          }
        </div>
      </div>

      <div class="flex flex-col gap-0.5 pt-0.5">
        <span class="text-sm font-medium text-neutral-800 leading-tight">{{ option.label }}</span>
        @if (option.description) {
          <span class="text-xs text-neutral-500 leading-snug">{{ option.description }}</span>
        }
      </div>
    </label>
  }
</fieldset>
