<div class="w-full overflow-x-auto rounded-lg border border-surface-200">
  @if (loading()) {
    <div class="flex items-center justify-center py-16 text-surface-400">
      <svg class="animate-spin w-6 h-6 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z" />
      </svg>
      Loading...
    </div>
  } @else {
    <table class="w-full text-sm text-left divide-y divide-surface-100">
      <ng-content select="thead" />
      @for (row of displayedData(); track row; let i = $index) {
        <ng-container
          *ngTemplateOutlet="rowTemplate().templateRef; context: rowContext(row, i)" />
      } @empty {
        <tbody>
          <tr>
            <td [attr.colspan]="emptyColspan()">
              {{ emptyMessage() }}
            </td>
          </tr>
        </tbody>
      }
    </table>

    @if (paginated() && data().length > 0) {
      <div class="px-4 py-3 border-t border-surface-200 bg-white">
        <tailwind-pagination
          [totalItems]="pagination()?.totalItems ?? data().length"
          [pageSize]="pagination()?.pageSize ?? 10"
          [currentPage]="currentPage()"
          (onPageChange)="currentPage.set($event)"
          [ariaLabel]="pagination()?.ariaLabel ?? 'Pagination'"
          [summary]="pagination()?.summary ?? 'Showing {start}-{end} of {total}'">
        </tailwind-pagination>
      </div>
    }
  }
</div>
