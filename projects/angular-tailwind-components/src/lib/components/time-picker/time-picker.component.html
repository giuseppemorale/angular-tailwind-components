<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label [attr.for]="id() ? id() + '-inner' : null" class="text-sm font-medium text-neutral-700">{{ label() }}</label>
  }
  <div class="relative">
    <input
      [attr.id]="id() ? id() + '-inner' : null"
      type="text"
      readonly
      [value]="displayValue()"
      [placeholder]="i18n.placeholder"
      [disabled]="isDisabled()"
      class="block w-full bg-white border border-neutral-300 rounded-md px-3 py-2 text-sm text-neutral-900 placeholder:text-neutral-400 outline-none focus:outline focus:outline-primary-500 focus:outline-offset-2 cursor-pointer disabled:bg-neutral-50 disabled:cursor-not-allowed pr-10"
      (click)="togglePanel()" />
    <svg
      class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-400 pointer-events-none"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 20 20"
      fill="currentColor">
      <path
        fill-rule="evenodd"
        d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"
        clip-rule="evenodd" />
    </svg>

    @if (showPanel()) {
      <div
        class="absolute left-0 top-full z-popover mt-1 w-52 rounded-xl border border-neutral-200 bg-white p-4 shadow-xl">
        <div class="flex items-center gap-2">
          <select
            class="flex-1 min-w-0 block bg-white border border-neutral-300 rounded-md px-2 py-1.5 text-sm text-neutral-900 outline-none focus:outline focus:outline-primary-500 focus:outline-offset-2 disabled:bg-neutral-50 disabled:cursor-not-allowed"
            [disabled]="isDisabled()"
            (change)="onHourChange($event)">
            @for (h of hours; track h) {
              <option [value]="h" [selected]="h === (draft()?.h ?? 0)">
                {{ h.toString().padStart(2, '0') }}
              </option>
            }
          </select>
          <span class="text-neutral-400 text-sm shrink-0">:</span>
          <select
            class="flex-1 min-w-0 block bg-white border border-neutral-300 rounded-md px-2 py-1.5 text-sm text-neutral-900 outline-none focus:outline focus:outline-primary-500 focus:outline-offset-2 disabled:bg-neutral-50 disabled:cursor-not-allowed"
            [disabled]="isDisabled()"
            (change)="onMinuteChange($event)">
            @for (m of minutes; track m) {
              <option [value]="m" [selected]="m === (draft()?.m ?? 0)">
                {{ m.toString().padStart(2, '0') }}
              </option>
            }
          </select>
        </div>
        <div class="mt-2 pt-2 border-t border-neutral-100 flex items-center justify-between gap-2">
          <button
            type="button"
            (click)="goToNow()"
            [disabled]="isDisabled()"
            class="text-xs text-primary-600 font-medium hover:underline cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:no-underline">
            {{ i18n.now }}
          </button>
          <button
            type="button"
            (click)="apply()"
            [disabled]="isDisabled()"
            class="px-3 py-1.5 text-xs font-medium rounded-md bg-primary-600 text-white hover:bg-primary-700 cursor-pointer disabled:bg-neutral-200 disabled:text-neutral-500 disabled:cursor-not-allowed">
            {{ i18n.apply }}
          </button>
        </div>
      </div>
    }
  </div>
</div>
