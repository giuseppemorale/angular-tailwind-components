<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label [attr.for]="id() ? id() + '-inner' : null" class="text-sm font-medium text-surface-700">{{ label() }}</label>
  }
  <div class="relative">
    <input
      [attr.id]="id() ? id() + '-inner' : null"
      type="time"
      [value]="value()"
      [disabled]="isDisabled()"
      class="block w-full bg-white border border-surface-300 rounded-md px-3 py-2 text-sm text-surface-900 outline-none focus:outline-2 focus:outline-primary-500 focus:outline-offset-2 disabled:bg-surface-50 disabled:cursor-not-allowed"
      (input)="onInput($event)"
      (blur)="onTouched()" />
  </div>
</div>
