<div class="fixed bottom-4 right-4 z-[1080] flex flex-col gap-2 max-w-sm w-full pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto rounded-xl border shadow-lg p-4 flex gap-3 animate-in slide-in-from-right-full duration-300"
      [class.bg-success-50]="toast.severity === 'success'"
      [class.border-success-200]="toast.severity === 'success'"
      [class.bg-warning-50]="toast.severity === 'warning'"
      [class.border-warning-200]="toast.severity === 'warning'"
      [class.bg-danger-50]="toast.severity === 'danger'"
      [class.border-danger-200]="toast.severity === 'danger'"
      [class.bg-info-50]="toast.severity === 'info'"
      [class.border-info-200]="toast.severity === 'info'"
      role="alert">
      <div class="flex-1 min-w-0">
        @if (toast.title) {
          <p class="text-sm font-semibold mb-0.5">{{ toast.title }}</p>
        }
        <p class="text-sm">{{ toast.message }}</p>
      </div>
      @if (toast.dismissible) {
        <button
          type="button"
          (click)="toastService.dismiss(toast.id)"
          class="shrink-0 p-1 rounded-lg opacity-60 hover:opacity-100 transition-opacity cursor-pointer"
          aria-label="Dismiss">
          <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path
              d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
          </svg>
        </button>
      }
    </div>
  }
</div>
