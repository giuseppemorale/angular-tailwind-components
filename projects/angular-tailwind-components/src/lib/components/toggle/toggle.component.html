<div class="inline-flex items-center gap-3 select-none" [class.opacity-50]="isDisabled()">
  <button
    type="button"
    role="switch"
    [attr.aria-checked]="checked()"
    [attr.aria-label]="switchAria().label"
    [attr.aria-labelledby]="switchAria().labelledBy"
    [disabled]="isDisabled()"
    [class]="trackClasses()"
    (click)="toggle()">
    <span [class]="thumbClasses()" aria-hidden="true"></span>
  </button>

  @if (label()) {
    <span [attr.id]="id() ? id() + '-label' : null" class="text-sm font-medium text-neutral-800">{{ label() }}</span>
  }
</div>
