<div [class]="rootClasses()">
  <div class="shrink-0">
    <ng-content select="[tailwind-toolbar-logo]" />
  </div>
  @if (orientation() === 'horizontal') {
    <nav class="min-w-0 flex flex-1 flex-row flex-wrap items-center gap-1" [attr.aria-label]="'Toolbar menu'">
      @if (menu().length) {
        <div class="flex shrink-0 items-center md:hidden">
          <button
            type="button"
            [class]="mobileMenuToggleClasses()"
            [attr.aria-expanded]="mobileToolbarMenu.isOpen()"
            aria-haspopup="menu"
            aria-label="Open navigation menu"
            (click)="mobileToolbarMenu.toggle($event)">
            <tailwind-icon icon="bars-3" [size]="22" [class]="menuItemIconClasses()" />
          </button>
          <tailwind-menu #mobileToolbarMenu [items]="menu()" align="left" (onSelect)="selectMenuItem($event)" />
        </div>
      }
      <div class="hidden min-w-0 flex-1 flex-row flex-wrap items-center gap-1 md:flex">
        @for (item of menu(); track menuTrackKey($index, item)) {
          @if (item.divider) {
            <span [class]="menuDividerLineClasses()" aria-hidden="true"></span>
          } @else {
            <button
              type="button"
              [disabled]="!!item.disabled"
              [class]="menuItemButtonClasses()"
              [class.px-2]="!!item.icon && !menuItemHasVisibleLabel(item)"
              [class.py-2]="!!item.icon && !menuItemHasVisibleLabel(item)"
              [attr.aria-label]="menuItemAriaLabel(item)"
              (click)="selectMenuItem(item)">
              @if (item.icon) {
                <tailwind-icon [icon]="item.icon" [size]="20" [class]="menuItemIconClasses()" />
              }
              @if (menuItemHasVisibleLabel(item)) {
                {{ item.label }}
              }
            </button>
          }
        }
      </div>
    </nav>
  } @else {
    <nav [class]="menuContainerClasses()" [attr.aria-label]="'Toolbar menu'">
      @for (item of menu(); track menuTrackKey($index, item)) {
        @if (item.divider) {
          <hr [class]="menuDividerRuleClasses()" />
        } @else {
          <button
            type="button"
            [disabled]="!!item.disabled"
            [class]="menuItemButtonClasses()"
            [class.justify-center]="!menuItemHasVisibleLabel(item)"
            [attr.aria-label]="menuItemAriaLabel(item)"
            (click)="selectMenuItem(item)">
            @if (item.icon) {
              <tailwind-icon [icon]="item.icon" [size]="22" [class]="menuItemIconClasses()" />
            }
            @if (menuItemHasVisibleLabel(item)) {
              {{ item.label }}
            }
          </button>
        }
      }
    </nav>
  }
  <div
    class="flex flex-wrap items-center gap-2 shrink-0"
    [class.justify-end]="orientation() === 'horizontal'"
    [class.mt-auto]="orientation() === 'vertical'">
    <ng-content select="[tailwind-toolbar-end]" />
  </div>
</div>
