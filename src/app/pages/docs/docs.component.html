<app-header [items]="breadcrumb" [description]="'DOCS.INTRO' | transloco" />

<div class="flex flex-col gap-8">
  <div class="flex flex-col gap-3">
    <tailwind-message severity="info">
      {{ 'DOCS.MESSAGE_INFO' | transloco }}
    </tailwind-message>
    <tailwind-message severity="warning">
      {{ 'DOCS.MESSAGE_WARNING_BEFORE' | transloco
      }}<code class="text-xs bg-neutral-100 px-1 rounded">{{ 'DOCS.MESSAGE_WARNING_CODE' | transloco }}</code
      >{{ 'DOCS.MESSAGE_WARNING_AFTER' | transloco }}
    </tailwind-message>
  </div>

  <tailwind-card [elevated]="true">
    <div tailwind-card-header>
      <tailwind-title titleTag="h3" [text]="'DOCS.PROGRESS_SECTION_TITLE' | transloco" icon="book-open" />
    </div>
    <div class="flex flex-col gap-4">
      <tailwind-progress-bar
        [value]="progressDemo()"
        [label]="'DOCS.PROGRESS_LABEL' | transloco"
        variant="primary"
        [showValue]="true" />
      <tailwind-button size="sm" kind="outlined" (onClick)="bumpProgress()">{{
        'DOCS.BTN_SIMULATE_PROGRESS' | transloco
      }}</tailwind-button>
    </div>
  </tailwind-card>
</div>
