<app-header [items]="breadcrumb" [description]="'PROFILE.INTRO' | transloco" />

<div class="flex flex-col gap-8">
  <tailwind-card [elevated]="true">
    <div tailwind-card-header>
      <tailwind-title titleTag="h3" [text]="'PROFILE.SECTION_IDENTITY' | transloco" icon="identification" />
    </div>

    <div class="flex flex-col gap-4">
      <form [formGroup]="form">
        <tailwind-input
          class="mb-2"
          id="profile-display"
          [formControl]="form.controls.name"
          [label]="'PROFILE.FIELD_NAME_LABEL' | transloco"
          [placeholder]="'PROFILE.FIELD_NAME_PLACEHOLDER' | transloco" />
        <tailwind-input
          class="mb-2"
          type="email"
          [formControl]="form.controls.email"
          [label]="'PROFILE.FIELD_EMAIL_LABEL' | transloco"
          [placeholder]="'PROFILE.FIELD_EMAIL_PLACEHOLDER' | transloco"
          [helperText]="'PROFILE.FIELD_EMAIL_HELPER' | transloco" />
        <tailwind-textarea
          class="mb-2"
          [formControl]="form.controls.bio"
          [label]="'PROFILE.FIELD_BIO_LABEL' | transloco"
          [placeholder]="'PROFILE.FIELD_BIO_PLACEHOLDER' | transloco" />
        <tailwind-divider />
        <tailwind-toggle
          id="profile-notify"
          [formControl]="form.controls.notify"
          [label]="'PROFILE.TOGGLE_NOTIFY' | transloco" />
      </form>
    </div>

    <div tailwind-card-footer class="flex flex-wrap items-center gap-3 justify-between">
      @if (saving()) {
        <tailwind-spinner
          size="sm"
          [label]="'PROFILE.SPINNER_LABEL' | transloco"
          [ariaLabel]="'PROFILE.SPINNER_LABEL' | transloco" />
      } @else {
        <span class="text-xs text-surface-500">{{ 'PROFILE.LAST_SAVE' | transloco }}</span>
      }
      <tailwind-button [disabled]="saving()" (onClick)="simulateSave()">{{
        'PROFILE.BTN_SAVE' | transloco
      }}</tailwind-button>
    </div>
  </tailwind-card>
</div>
