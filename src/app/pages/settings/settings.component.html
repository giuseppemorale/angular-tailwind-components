<div class="flex flex-col gap-8">
  <div class="flex flex-col gap-2">
    <tailwind-title titleTag="h1" text="Impostazioni" icon="cog-6-tooth" />
    <p class="text-surface-600 text-sm max-w-2xl">
      Tab, select e toggle per verificare focus, modello dati e contenuti dinamici.
    </p>
  </div>

  <tailwind-tab-group ariaLabel="Sezioni impostazioni" [(activeIndex)]="tabIndex">
    <tailwind-tab label="Aspetto">
      <tailwind-card [hasFooter]="false" class="mt-2">
        <div tailwind-card-header>
          <tailwind-title titleTag="h3" text="Layout" icon="swatch" />
        </div>
        <div class="flex flex-col gap-4">
          <tailwind-select
            label="Densità interfaccia"
            placeholder="Scegli un’opzione"
            [options]="densityOptions"
            [(value)]="theme" />
          <tailwind-divider label="Preferenze" />
          <tailwind-toggle id="settings-reduced" label="Riduci animazioni" />
          <tailwind-toggle id="settings-high-contrast" label="Evidenzia focus (test accessibilità)" />
        </div>
      </tailwind-card>
    </tailwind-tab>

    <tailwind-tab label="Avanzate">
      <tailwind-card [hasHeader]="false" [hasFooter]="false" class="mt-2">
        <p class="text-sm text-surface-600 m-0 mb-4">
          Secondo pannello: controlla che il cambio tab mantenga lo scroll e lo stato dove previsto.
        </p>
        <tailwind-toggle id="settings-telemetry" label="Consenti telemetria anonima (solo demo)" />
      </tailwind-card>
    </tailwind-tab>
  </tailwind-tab-group>
</div>
