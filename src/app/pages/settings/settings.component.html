<app-header [items]="breadcrumb" [description]="'PROFILE.INTRO' | transloco" />

<div class="flex flex-col gap-8">
  <tailwind-tab-group [ariaLabel]="'SETTINGS.TABS_ARIA' | transloco" [(activeIndex)]="tabIndex">
    <tailwind-tab [label]="'SETTINGS.TAB_APPEARANCE' | transloco">
      <tailwind-card [hasFooter]="false" class="mt-2">
        <div tailwind-card-header>
          <tailwind-title titleTag="h3" [text]="'SETTINGS.SECTION_LAYOUT' | transloco" icon="swatch" />
        </div>
        <div class="flex flex-col gap-4">
          <tailwind-select
            [label]="'SETTINGS.FIELD_DENSITY_LABEL' | transloco"
            [placeholder]="'SETTINGS.FIELD_DENSITY_PLACEHOLDER' | transloco"
            [options]="densityOptions"
            [(value)]="theme" />
          <tailwind-divider [label]="'SETTINGS.DIVIDER_PREFERENCES' | transloco" />
          <tailwind-toggle id="settings-reduced" [label]="'SETTINGS.TOGGLE_REDUCED_MOTION' | transloco" />
          <tailwind-toggle id="settings-high-contrast" [label]="'SETTINGS.TOGGLE_FOCUS_HIGHLIGHT' | transloco" />
        </div>
      </tailwind-card>
    </tailwind-tab>

    <tailwind-tab [label]="'SETTINGS.TAB_ADVANCED' | transloco">
      <tailwind-card [hasHeader]="false" [hasFooter]="false" class="mt-2">
        <p class="text-sm text-neutral-600 m-0 mb-4">
          {{ 'SETTINGS.ADVANCED_PANEL_INTRO' | transloco }}
        </p>
        <tailwind-toggle id="settings-telemetry" [label]="'SETTINGS.TOGGLE_TELEMETRY' | transloco" />
      </tailwind-card>
    </tailwind-tab>
  </tailwind-tab-group>
</div>
